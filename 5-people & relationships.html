    // --- HTML GENERATORS ---
    
    // Updated generateInput to support responsive inline widths
    function generateInput({ correct, placeholder = "type here", widthClass = "w-28 sm:w-36 md:w-48" }) {
      const correctStr = JSON.stringify(correct).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      const firstAnswer = correct[0].replace(/'/g, '&#39;');
      return `
        <div class="inline-block relative m-1 exercise-component align-middle ${widthClass === 'w-full' ? 'w-full block mx-0 mt-2' : ''}">
          <input type="text" class="exercise-input border-b-2 outline-none px-2 py-1 transition-all duration-200 text-center font-bold text-indigo-900 border-gray-300 focus:border-indigo-500 focus:bg-indigo-50 bg-transparent rounded-t-sm ${widthClass}" data-correct="${correctStr}" placeholder="${placeholder}" autocomplete="off" autocorrect="off" spellcheck="false" />
          <span class="feedback-icon absolute ${widthClass === 'w-full' ? 'right-2' : '-right-2 sm:-right-6'} top-1 text-lg drop-shadow-sm flex items-center justify-center pointer-events-none"></span>
          <div class="answer-tooltip absolute top-full left-1/2 -translate-x-1/2 mt-2 px-3 py-1.5 rounded z-30 hidden transition-opacity duration-200 text-xs w-max max-w-[200px] sm:max-w-none whitespace-normal sm:whitespace-nowrap text-center break-words">${firstAnswer}</div>
        </div>
      `;
    }

    // Updated generateSelect to support responsive dropdowns wrapping text
    function generateSelect({ options, correct }) {
      const optionsHtml = options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
      return `
        <div class="inline-block relative m-1 exercise-component align-middle w-full sm:w-auto">
          <select class="exercise-select border-b-2 outline-none px-2 py-1 appearance-none bg-transparent font-bold text-indigo-900 text-center pr-6 cursor-pointer transition-all duration-200 border-gray-300 focus:border-indigo-500 focus:bg-indigo-50 rounded-t-sm max-w-[200px] sm:max-w-[300px] text-ellipsis" data-correct="${correct}">
            <option value="" disabled selected>select...</option>
            ${optionsHtml}
          </select>
          <span class="feedback-icon absolute -right-2 top-1 text-lg drop-shadow-sm flex items-center justify-center pointer-events-none"></span>
          <div class="answer-tooltip absolute top-full left-1/2 -translate-x-1/2 mt-2 px-3 py-1.5 rounded z-30 hidden transition-opacity duration-200 text-xs w-max max-w-[200px] sm:max-w-none whitespace-normal sm:whitespace-nowrap text-center break-words">${correct}</div>
        </div>
      `;
    }

    function generateFlashcard(question, answer) {
      return `
        <div class="flashcard p-4 border rounded-xl cursor-pointer transition-all duration-300 bg-white border-gray-200 hover:border-indigo-300 hover:shadow-md select-none group relative overflow-hidden">
          <div class="flex justify-between items-start pointer-events-none relative z-10">
            <p class="font-medium text-gray-800 leading-snug group-hover:text-indigo-900 transition-colors text-sm sm:text-base">${question}</p>
            <span class="status-badge text-xs text-gray-500 uppercase tracking-wider font-bold bg-gray-100 px-2 py-1 rounded-md ml-2 shrink-0 transition-colors">Reveal</span>
          </div>
          <div class="answer-content hidden mt-3 pt-3 border-t border-indigo-100 text-indigo-700 font-bold flex items-center gap-2 pointer-events-none relative z-10 text-sm sm:text-base">
            <i class="fa-solid fa-check-circle text-indigo-500"></i> ${answer}
          </div>
          <!-- Background highlight element -->
          <div class="absolute inset-0 bg-indigo-50 transform scale-y-0 origin-bottom transition-transform duration-300 ease-out z-0 bg-highlight"></div>
        </div>
      `;
    }

    // --- STATE AND LOGIC ---
    let currentUnit = 'unit17';

    // Elements
    const theoryContainer = document.getElementById('theory-container');
    const theoryTabsContainer = document.getElementById('theory-tabs-container');
    const exercisesContainer = document.getElementById('exercises-container');
    const subTabsContainer = document.getElementById('sub-tabs-container');
    const exerciseTitle = document.getElementById('exercise-title');
    const tabButtons = document.querySelectorAll('.tab-btn');
    const btnReset = document.getElementById('btn-reset');

    function loadUnit(unitId) {
      currentUnit = unitId;
      
      // Update Main Navigation Tabs
      tabButtons.forEach(btn => {
        if (btn.dataset.target === unitId) {
          btn.className = "tab-btn whitespace-nowrap px-4 py-2 rounded-md text-sm font-semibold transition-all bg-white text-indigo-900 shadow border-b-2 border-indigo-500";
        } else {
          btn.className = "tab-btn whitespace-nowrap px-4 py-2 rounded-md text-sm font-semibold transition-all text-indigo-100 hover:bg-indigo-700 border-b-2 border-transparent";
        }
      });

      // Fetch Unit Data
      const data = contentData[unitId];
      exerciseTitle.innerHTML = `<i class="fa-solid fa-pen-nib text-indigo-600 mr-2"></i> ${data.title}`;
      
      // Clear containers
      theoryTabsContainer.innerHTML = '';
      theoryContainer.innerHTML = '';
      subTabsContainer.innerHTML = '';
      exercisesContainer.innerHTML = '';

      // Generate Theory Sub-tabs
      data.theory.forEach((th, index) => {
        const tabBtn = document.createElement('button');
        tabBtn.className = "theory-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 whitespace-nowrap";
        tabBtn.textContent = th.tabLabel;
        tabBtn.onclick = () => switchTheoryTab(index);
        theoryTabsContainer.appendChild(tabBtn);

        const wrapper = document.createElement('div');
        wrapper.className = "theory-tab-content hidden"; 
        wrapper.innerHTML = th.html;
        theoryContainer.appendChild(wrapper);
      });

      // Generate Exercise Sub-tabs and Exercise Blocks
      data.exercises.forEach((ex, index) => {
        // 1. Create Tab Button
        const tabBtn = document.createElement('button');
        tabBtn.className = "sub-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 whitespace-nowrap flex items-center gap-2";
        tabBtn.innerHTML = `${ex.tabLabel} <span class="hidden tab-score-badge bg-indigo-100 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded-full"></span>`;
        tabBtn.onclick = () => switchSubTab(index);
        subTabsContainer.appendChild(tabBtn);

        // 2. Create Exercise Wrapper
        const wrapper = document.createElement('div');
        wrapper.className = "exercise-tab-content hidden"; // all hidden initially
        wrapper.innerHTML = ex.html;
        wrapper.dataset.tabIndex = index;
        exercisesContainer.appendChild(wrapper);
      });

      // Inject Per-Exercise Validation Controls
      const blocks = exercisesContainer.querySelectorAll('.exercise-block');
      blocks.forEach(block => {
        // Only append Check Button if there are inputs/selects to check
        if (block.querySelectorAll('.exercise-input, .exercise-select').length > 0) {
          const controlDiv = document.createElement('div');
          controlDiv.className = "mt-6 flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-gray-100 pt-4 bg-gray-50/50 -mx-4 sm:-mx-5 -mb-4 sm:-mb-5 px-4 sm:px-5 py-4 rounded-b-xl";
          
          const scoreDisplay = document.createElement('div');
          scoreDisplay.className = "score-display font-bold text-lg text-indigo-700 opacity-0 transition-opacity flex items-center gap-2";
          scoreDisplay.innerHTML = `<i class="fa-solid fa-ranking-star"></i> <span class="score-text"></span>`;

          const rightControls = document.createElement('div');
          rightControls.className = "flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto";

          const warningSpan = document.createElement('span');
          warningSpan.className = "text-red-500 text-sm font-bold hidden flex items-center gap-1 warning-msg drop-shadow-sm";
          warningSpan.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Fill all blanks!';
          
          const checkBtn = document.createElement('button');
          checkBtn.className = "w-full sm:w-auto flex items-center justify-center gap-2 font-bold px-6 py-2.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg active:scale-95";
          checkBtn.innerHTML = '<i class="fa-solid fa-clipboard-check"></i> Check Answers';
          checkBtn.onclick = () => validateExerciseBlock(block, warningSpan, scoreDisplay);
          
          rightControls.appendChild(warningSpan);
          rightControls.appendChild(checkBtn);
          
          controlDiv.appendChild(scoreDisplay);
          controlDiv.appendChild(rightControls);
          block.appendChild(controlDiv);
        }
      });

      setupFlashcards();
      
      // Default to the first sub-tabs
      if (data.theory.length > 0) switchTheoryTab(0);
      if (data.exercises.length > 0) switchSubTab(0);
    }

    function switchTheoryTab(activeIndex) {
      const btns = document.querySelectorAll('.theory-tab-btn');
      const contents = document.querySelectorAll('.theory-tab-content');

      btns.forEach((btn, idx) => {
        if (idx === activeIndex) {
          btn.className = "theory-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 bg-white text-indigo-700 border-gray-200 shadow-[0_-2px_4px_rgba(0,0,0,0.02)] relative top-[1px] z-10 cursor-default whitespace-nowrap";
        } else {
          btn.className = "theory-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 bg-transparent text-gray-500 border-transparent hover:bg-gray-100 hover:text-gray-700 cursor-pointer whitespace-nowrap";
        }
      });

      contents.forEach((content, idx) => {
        if (idx === activeIndex) {
          content.classList.remove('hidden');
        } else {
          content.classList.add('hidden');
        }
      });
    }

    function switchSubTab(activeIndex) {
      const btns = document.querySelectorAll('.sub-tab-btn');
      const contents = document.querySelectorAll('.exercise-tab-content');

      btns.forEach((btn, idx) => {
        if (idx === activeIndex) {
          btn.className = "sub-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 bg-white text-indigo-700 border-gray-200 shadow-[0_-2px_4px_rgba(0,0,0,0.02)] relative top-[1px] z-10 cursor-default whitespace-nowrap flex items-center gap-2";
        } else {
          btn.className = "sub-tab-btn px-4 py-2 text-sm font-bold rounded-t-lg transition-colors border border-b-0 bg-transparent text-gray-500 border-transparent hover:bg-gray-100 hover:text-gray-700 cursor-pointer whitespace-nowrap flex items-center gap-2";
        }
      });

      contents.forEach((content, idx) => {
        if (idx === activeIndex) {
          content.classList.remove('hidden');
        } else {
          content.classList.add('hidden');
        }
      });
    }

    function setupFlashcards() {
      const flashcards = exercisesContainer.querySelectorAll('.flashcard');
      flashcards.forEach(card => {
        card.addEventListener('click', function() {
          const content = this.querySelector('.answer-content');
          const badge = this.querySelector('.status-badge');
          const bgHighlight = this.querySelector('.bg-highlight');
          
          if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            this.classList.replace('border-gray-200', 'border-indigo-300');
            if (bgHighlight) bgHighlight.classList.replace('scale-y-0', 'scale-y-100');
            badge.textContent = 'Hide';
            badge.className = "status-badge text-xs text-indigo-700 uppercase tracking-wider font-bold bg-indigo-200 px-2 py-1 rounded-md ml-2 shrink-0 transition-colors";
          } else {
            content.classList.add('hidden');
            this.classList.replace('border-indigo-300', 'border-gray-200');
            if (bgHighlight) bgHighlight.classList.replace('scale-y-100', 'scale-y-0');
            badge.textContent = 'Reveal';
            badge.className = "status-badge text-xs text-gray-500 uppercase tracking-wider font-bold bg-gray-100 px-2 py-1 rounded-md ml-2 shrink-0 transition-colors";
          }
        });
      });
    }

    // Helper to strip punctuation to make typing validation more forgiving
    function normalizeTextForComparison(text) {
      return text.toLowerCase().replace(/[.,?!]/g, '').replace(/\s+/g, ' ').trim();
    }

    function validateExerciseBlock(block, warningSpan, scoreDisplay) {
      const inputs = block.querySelectorAll('.exercise-input');
      const selects = block.querySelectorAll('.exercise-select');
      const elements = [...inputs, ...selects];
      
      if (elements.length === 0) return;

      // 1. Force all blanks to be filled check
      let allFilled = true;
      elements.forEach(el => {
        if(el.value.trim() === '') {
          allFilled = false;
          el.classList.add('input-empty-error');
        } else {
          el.classList.remove('input-empty-error');
        }
      });

      if (!allFilled) {
        warningSpan.classList.remove('hidden', 'shake');
        void warningSpan.offsetWidth; // trigger browser reflow
        warningSpan.classList.add('shake');
        return;
      }

      // 2. Proceed with validation if all filled
      warningSpan.classList.add('hidden');
      let correctCount = 0;

      const processElement = (el, isSelect) => {
        const rawVal = el.value.trim();
        const val = normalizeTextForComparison(rawVal);
        const parent = el.closest('.exercise-component');
        const iconContainer = parent.querySelector('.feedback-icon');
        const tooltip = parent.querySelector('.answer-tooltip');
        
        // Reset classes
        el.classList.remove('input-correct', 'input-incorrect', 'input-empty-error');
        iconContainer.innerHTML = '';
        tooltip.classList.add('hidden');

        let isCorrect = false;

        if (isSelect) {
          isCorrect = (rawVal === el.dataset.correct);
        } else {
          const correctAnswersArray = JSON.parse(el.dataset.correct.replace(/&quot;/g, '"').replace(/&#39;/g, "'"));
          isCorrect = correctAnswersArray.some(ans => normalizeTextForComparison(ans) === val);
        }

        if (isCorrect) {
          el.classList.add('input-correct');
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 bg-white rounded-full leading-none"></i>';
          correctCount++;
        } else {
          el.classList.add('input-incorrect');
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 bg-white rounded-full leading-none"></i>';
          tooltip.classList.remove('hidden'); // Automatically reveal correct answer on mistake
        }
      };

      inputs.forEach(el => processElement(el, false));
      selects.forEach(el => processElement(el, true));

      // Update Score UI
      const total = elements.length;
      scoreDisplay.querySelector('.score-text').textContent = `${correctCount} / ${total} Correct`;
      scoreDisplay.classList.remove('opacity-0');
      
      if (correctCount === total) {
        scoreDisplay.classList.remove('text-indigo-700');
        scoreDisplay.classList.add('text-indigo-600', 'scale-105');
        scoreDisplay.innerHTML = `<i class="fa-solid fa-crown text-amber-500"></i> <span class="score-text text-indigo-600">Perfect! ${correctCount}/${total}</span>`;
      } else {
        scoreDisplay.classList.add('text-indigo-700');
        scoreDisplay.classList.remove('text-indigo-600', 'scale-105');
        scoreDisplay.innerHTML = `<i class="fa-solid fa-ranking-star"></i> <span class="score-text">${correctCount} / ${total} Correct</span>`;
      }

      // Update Tab Badge
      const parentTabContent = block.closest('.exercise-tab-content');
      if (parentTabContent) {
        const tabIndex = parentTabContent.dataset.tabIndex;
        const badge = subTabsContainer.querySelectorAll('.tab-score-badge')[tabIndex];
        if (badge) {
          badge.textContent = `${correctCount}/${total}`;
          badge.classList.remove('hidden');
          if (correctCount === total) {
             badge.classList.replace('bg-indigo-100', 'bg-indigo-500');
             badge.classList.replace('text-indigo-700', 'text-white');
          } else {
             badge.classList.replace('bg-indigo-500', 'bg-indigo-100');
             badge.classList.replace('text-white', 'text-indigo-700');
          }
        }
      }
    }

    function resetAllExercises() {
      if(confirm("Clear all your progress for this unit?")) {
        const inputs = exercisesContainer.querySelectorAll('.exercise-input');
        const selects = exercisesContainer.querySelectorAll('.exercise-select');
        const components = exercisesContainer.querySelectorAll('.exercise-component');
        const warnings = exercisesContainer.querySelectorAll('.warning-msg');
        const scores = exercisesContainer.querySelectorAll('.score-display');
        const badges = subTabsContainer.querySelectorAll('.tab-score-badge');
        
        inputs.forEach(input => {
          input.value = '';
          input.disabled = false;
          input.classList.remove('input-correct', 'input-incorrect', 'input-empty-error');
        });
        
        selects.forEach(select => {
          select.value = '';
          select.disabled = false;
          select.classList.remove('input-correct', 'input-incorrect', 'input-empty-error');
        });

        components.forEach(parent => {
          parent.querySelector('.feedback-icon').innerHTML = '';
          parent.querySelector('.answer-tooltip').classList.add('hidden');
        });

        warnings.forEach(warning => warning.classList.add('hidden'));
        scores.forEach(s => s.classList.add('opacity-0'));
        badges.forEach(b => {
          b.classList.add('hidden');
          b.textContent = '';
        });

        // Reset Flashcards
        const flashcards = exercisesContainer.querySelectorAll('.flashcard');
        flashcards.forEach(card => {
          const content = card.querySelector('.answer-content');
          const badge = card.querySelector('.status-badge');
          const bgHighlight = card.querySelector('.bg-highlight');
          
          content.classList.add('hidden');
          card.classList.replace('border-indigo-300', 'border-gray-200');
          if (bgHighlight) bgHighlight.classList.replace('scale-y-100', 'scale-y-0');
          badge.textContent = 'Reveal';
          badge.className = "status-badge text-xs text-gray-500 uppercase tracking-wider font-bold bg-gray-100 px-2 py-1 rounded-md ml-2 shrink-0 transition-colors";
        });
      }
    }

    // --- EVENT LISTENERS ---
    
    // Tab switching
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => loadUnit(btn.dataset.target));
    });

    // Reset Button
    btnReset.addEventListener('click', resetAllExercises);

    // Remove red borders and tooltips when user edits a field
    exercisesContainer.addEventListener('input', (e) => {
      if (e.target.classList.contains('exercise-input') || e.target.classList.contains('exercise-select')) {
        e.target.classList.remove('input-empty-error', 'input-incorrect');
        const parent = e.target.closest('.exercise-component');
        parent.querySelector('.feedback-icon').innerHTML = '';
        parent.querySelector('.answer-tooltip').classList.add('hidden');
        
        // Hide empty warning if they start typing
        const block = e.target.closest('.exercise-block');
        if (block) {
          const warning = block.querySelector('.warning-msg');
          if (warning) warning.classList.add('hidden');
        }
      }
    });

    // Initial Load
    loadUnit('unit17');

  </script>
</body>
</html>
